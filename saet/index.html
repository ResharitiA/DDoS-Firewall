<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDoS-Guard | Академия Фаервола</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-bg">

    <header class="header">
        <div class="container">
            <div class="logo-pixel">DDoS-Guard</div>
        </div>
    </header>

    <main class="main">
        <section class="hero container">
            <div class="hero-text">
                <h1 class="title">Надежная защита <br>от DDoS-атак</h1>
                <p class="subtitle captions-text">Но сначала... Твоя очередь стать защитником!</p>
            </div>

            <div class="mascot-stage">
                <div class="stage-floor"></div>
                
                <div class="mascot-hero-container">
                    <img src="image_1.png" alt="Дракон Фаервол Герой" class="mascot-hero pixel-art">
                    <div class="shield-glow"></div>
                </div>

                <div class="attackers-container">
                    <div class="attacker bot-1 pixel-art"></div>
                    <div class="attacker bot-2 pixel-art"></div>
                    <div class="attacker bot-3 pixel-art"></div>
                </div>

                <div class="server-node container-server pixel-art">
                     <img src="image_4.png" alt="Сервер DDoS-Guard" class="server-image">
                     <div class="data-packets"></div>
                </div>
            </div>

            <div class="cta-container">
                <button id="startGameBtn" class="btn btn-primary">Начать игру</button>
            </div>

        </section>
    </main>

    <footer class="footer captions-text">
        <div class="container">
            DDoS-Guard. Все права защищены.
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
