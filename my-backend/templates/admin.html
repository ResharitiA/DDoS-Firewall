<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админка</title>
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f4f4f4; }
        .del-btn { color: white; background: #ff4d4d; padding: 5px 10px; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Управление пользователями</h1>
    <a href="/logout">Выйти</a>
    <table>
        <tr>
            <th>ID</th>
            <th>Имя</th>
            <th>Фамилия</th>
            <th>Телефон</th>
            <th>Действие</th>
        </tr>
        {{range .}}
        <tr>
            <td>{{.ID}}</td>
            <td>{{.FirstName}}</td>
            <td>{{.LastName}}</td>
            <td>{{.Phone}}</td>
            <td>
                <a href="/delete?id={{.ID}}" class="del-btn" onclick="return confirm('Точно удалить?')">Удалить</a>
            </td>
        </tr>
        {{end}}
    </table>
</body>
</html>
